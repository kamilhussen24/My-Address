<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Malaysia Address Generator</title>
  <meta name="description" content="Unlimited Realistic Malaysia Address Generator">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --surface2: #181e2e;
      --border: rgba(255,255,255,0.07);
      --accent: #e8c547;
      --text: #e8ecf4;
      --muted: #6b7694;
      --success: #34d399;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(232,197,71,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    /* Ad Banner */
    .ad-banner {
      width: 100%;
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .ad-banner-bottom {
      border-bottom: none;
      border-top: 1px solid var(--border);
      padding: 16px 0 10px;
      margin-top: 8px;
    }

    /* Header */
    .header {
      position: relative;
      z-index: 5;
      text-align: center;
      padding: 32px 20px 22px;
      width: 100%;
      max-width: 480px;
    }

    .flag-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 100px;
      padding: 5px 14px 5px 9px;
      font-size: 0.72rem;
      color: var(--muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 600;
    }
    .flag-emoji { font-size: 1.1rem; }

    h1 {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: clamp(1.7rem, 7vw, 2.2rem);
      font-weight: 800;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: #ffffff;
      margin-bottom: 8px;
    }
    h1 span {
      color: var(--accent);
    }

    .subtitle {
      font-size: 0.88rem;
      color: var(--muted);
      font-weight: 400;
    }

    /* Main */
    .main {
      flex: 1;
      padding: 0 16px 24px;
      max-width: 480px;
      width: 100%;
      position: relative;
      z-index: 5;
    }

    /* Generate Button */
    .generate-btn {
      width: 100%;
      position: relative;
      background: var(--accent);
      color: #0a0d14;
      border: none;
      padding: 15px 24px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.01em;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      margin-bottom: 18px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(232,197,71,0.25);
    }
    .generate-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
      pointer-events: none;
    }
    .generate-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 32px rgba(232,197,71,0.35);
    }
    .generate-btn:active { transform: scale(0.975); }

    .btn-icon {
      font-size: 1.05rem;
      display: inline-block;
      transition: transform 0.45s ease;
    }
    .generate-btn:hover .btn-icon { transform: rotate(180deg); }

    /* Card */
    .address-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5);
      animation: fadeUp 0.35s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Card Header Strip */
    .card-header {
      background: var(--surface2);
      padding: 13px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .card-header-label {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
    }
    .card-header-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.7rem;
      color: var(--success);
      font-weight: 600;
    }
    .status-dot {
      width: 6px; height: 6px;
      background: var(--success);
      border-radius: 50%;
      animation: blink 2.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%,100% { opacity:1; }
      50%      { opacity:0.3; }
    }

    /* Fields */
    .field-list {
      padding: 13px 15px 4px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .field-row {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 11px 13px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 10px;
      transition: border-color 0.2s;
      min-height: 56px;
    }
    .field-row:hover { border-color: rgba(255,255,255,0.13); }

    .field-label {
      font-size: 0.65rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 4px;
    }
    .field-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.92rem;
      color: var(--text);
      line-height: 1.4;
      font-weight: 500;
      word-break: break-word;
    }

    /* Copy Button */
    .copy-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--muted);
      width: 33px;
      height: 33px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.88rem;
      transition: all 0.18s;
      flex-shrink: 0;
    }
    .copy-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .copy-btn.copied {
      background: rgba(52,211,153,0.15);
      border-color: rgba(52,211,153,0.3);
      color: var(--success);
    }

    /* Full Address Block */
    .full-addr-row {
      margin: 10px 15px 15px;
      background: rgba(232,197,71,0.05);
      border: 1px solid rgba(232,197,71,0.16);
      border-radius: 12px;
      padding: 14px;
    }
    .full-addr-label {
      font-size: 0.65rem;
      letter-spacing: 0.11em;
      text-transform: uppercase;
      color: rgba(232,197,71,0.6);
      font-weight: 700;
      margin-bottom: 8px;
    }
    .full-addr-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--text);
      line-height: 1.75;
      white-space: pre-line;
      margin-bottom: 12px;
      font-weight: 500;
    }
    .copy-full-btn {
      width: 100%;
      background: var(--accent);
      color: #0a0d14;
      border: none;
      padding: 10px 14px;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.82rem;
      font-weight: 800;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.18s;
      letter-spacing: 0.02em;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .copy-full-btn:hover { opacity: 0.85; }
    .copy-full-btn.copied { background: var(--success); }

    /* Footer */
    .footer {
      width: 100%;
      text-align: center;
      padding: 18px 16px;
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 500;
      border-top: 1px solid var(--border);
      position: relative;
      z-index: 5;
    }
    .footer strong {
      color: var(--accent);
      font-weight: 700;
    }

    /* Responsive */
    @media (min-width: 520px) {
      .main { padding: 0 20px 28px; }
      .header { padding: 36px 20px 24px; }
      .field-value { font-size: 0.96rem; }
      .full-addr-value { font-size: 0.88rem; }
    }
  </style>
</head>
<body>

  <!-- Top Ad -->
  <div class="ad-banner">
    <script>
      atOptions = {
        'key'    : '090025890801906503e12a37670b81ed',
        'format' : 'iframe',
        'height' : 50,
        'width'  : 320,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/090025890801906503e12a37670b81ed/invoke.js"></script>
  </div>

  <!-- Header -->
  <div class="header">
    <div class="flag-badge">
      <span class="flag-emoji">🇲🇾</span>
      Malaysia · MY
    </div>
    <h1>Malaysia <span>Address</span> Generator</h1>
    <p class="subtitle">Realistic addresses · Unlimited · Free</p>
  </div>

  <!-- Main -->
  <div class="main">
    <button class="generate-btn" id="generateBtn">
      <span class="btn-icon">⟳</span>
      Generate New Address
    </button>
    <div id="addressCard" class="address-card"></div>
  </div>

  <!-- Bottom Ad -->
  <div class="ad-banner ad-banner-bottom">
    <script>
      atOptions = {
        'key'    : '3206caa39e8ec2654d434ca85bb7ab6c',
        'format' : 'iframe',
        'height' : 250,
        'width'  : 300,
        'params' : {}
      };
    </script>
    <script src="https://www.highperformanceformat.com/3206caa39e8ec2654d434ca85bb7ab6c/invoke.js"></script>
  </div>

  <div class="footer">
    Made By <strong>KDex</strong> &nbsp;·&nbsp; Malaysia Address Generator
  </div>

  <script>
    const CITIES_DB = [
      { city: "Kuala Lumpur",    state: "Wilayah Persekutuan", minZip: 50000, maxZip: 60000 },
      { city: "Petaling Jaya",   state: "Selangor",            minZip: 46000, maxZip: 47400 },
      { city: "Shah Alam",       state: "Selangor",            minZip: 40000, maxZip: 40700 },
      { city: "Subang Jaya",     state: "Selangor",            minZip: 47500, maxZip: 47650 },
      { city: "Klang",           state: "Selangor",            minZip: 41000, maxZip: 42100 },
      { city: "Johor Bahru",     state: "Johor",               minZip: 80000, maxZip: 81200 },
      { city: "George Town",     state: "Pulau Pinang",        minZip: 10000, maxZip: 11800 },
      { city: "Ipoh",            state: "Perak",               minZip: 30000, maxZip: 31650 },
      { city: "Melaka",          state: "Melaka",              minZip: 75000, maxZip: 75700 },
      { city: "Kuching",         state: "Sarawak",             minZip: 93000, maxZip: 93900 },
      { city: "Kota Kinabalu",   state: "Sabah",               minZip: 88000, maxZip: 88850 },
      { city: "Alor Setar",      state: "Kedah",               minZip: 5000,  maxZip: 5200  },
      { city: "Seremban",        state: "Negeri Sembilan",     minZip: 70000, maxZip: 70450 },
      { city: "Kuantan",         state: "Pahang",              minZip: 25000, maxZip: 26600 },
    ];

    const ROAD_TYPES = ["Jalan", "Lorong", "Persiaran", "Lebuh", "Jalan Bukit", "Jalan Sri"];
    const ROAD_NAMES = ["Damai", "Permai", "Indah", "Jaya", "Murni", "Bestari", "Utama", "Cempaka", "Melati", "Wawasan", "Harmoni", "Setia", "Bahagia", "Maju"];
    const AREA_NAMES = ["Taman", "Pandan", "Kepong", "Bangsar", "Cheras", "Ampang", "Bukit Jalil", "Mont Kiara", "Damansara", "Duta"];

    function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    function getHouseNumber() {
      const n = rand(1, 280);
      const r = Math.random();
      if (r > 0.8)  return `${rand(1, 40)}-${rand(1, 25)}`;
      if (r > 0.65) return `${n}${pick(["A","B","C"])}`;
      return `${n}`;
    }

    function generateAddress() {
      const loc      = pick(CITIES_DB);
      const type     = pick(ROAD_TYPES);
      const name     = pick(ROAD_NAMES);
      const area     = Math.random() > 0.5 ? `, ${pick(AREA_NAMES)}` : "";
      const street   = `${getHouseNumber()}, ${type} ${name}${area}`;
      const postcode = String(rand(loc.minZip, loc.maxZip)).padStart(5, "0");
      return {
        street,
        postcode,
        city:  loc.city,
        state: loc.state,
        full:  `${street}\n${postcode} ${loc.city}\n${loc.state}\nMALAYSIA`
      };
    }

    function copySingle(btn, text) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = "✓";
        btn.classList.add("copied");
        setTimeout(() => { btn.textContent = "⎘"; btn.classList.remove("copied"); }, 2000);
      });
    }

    function renderAddress(addr) {
      const card = document.getElementById("addressCard");

      const fields = [
        { label: "Street Address", value: addr.street   },
        { label: "Postcode",       value: addr.postcode  },
        { label: "City",           value: addr.city      },
        { label: "State",          value: addr.state     },
      ];

      let html = `
        <div class="card-header">
          <span class="card-header-label">Generated Address</span>
          <span class="card-header-status"><span class="status-dot"></span>Verified Format</span>
        </div>
        <div class="field-list">`;

      fields.forEach(f => {
        html += `
          <div class="field-row">
            <div>
              <div class="field-label">${f.label}</div>
              <div class="field-value">${f.value}</div>
            </div>
            <button class="copy-btn" data-val="${encodeURIComponent(f.value)}" title="Copy">⎘</button>
          </div>`;
      });

      html += `</div>
        <div class="full-addr-row">
          <div class="full-addr-label">Full Address</div>
          <div class="full-addr-value">${addr.full}</div>
          <button class="copy-full-btn" id="copyFullBtn">📋 Copy Full Address</button>
        </div>`;

      card.innerHTML = html;

      // Reset animation
      card.style.animation = "none";
      void card.offsetWidth;
      card.style.animation = "fadeUp 0.3s ease forwards";

      // Field copy buttons
      card.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", () => copySingle(btn, decodeURIComponent(btn.dataset.val)));
      });

      // Full address copy
      const fullBtn = card.querySelector("#copyFullBtn");
      fullBtn.addEventListener("click", () => {
        navigator.clipboard.writeText(addr.full).then(() => {
          fullBtn.textContent = "✅ Copied!";
          fullBtn.classList.add("copied");
          setTimeout(() => {
            fullBtn.textContent = "📋 Copy Full Address";
            fullBtn.classList.remove("copied");
          }, 2000);
        });
      });
    }

    // Init
    renderAddress(generateAddress());
    document.getElementById("generateBtn").addEventListener("click", () => {
      renderAddress(generateAddress());
    });
  </script>
</body>
</html>
